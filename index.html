<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Permit Application Checklists</title>
  <link href="assets/css/tailwind.css" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    /* Standard Style */
    .city-blue-bg {background-color:#2A768D;}
    .city-bg-blue-50 {background-color:rgba(42, 118, 141, 0.2);}
    .city-blue-border {border-color:#2A768D;}
    .city-blue-text {color:#2A768D;}
    .hint-bg {background-color:rgba(22, 163, 74, 0.12);}
    .hint-border {border-color:#16A34A;}
    .hint-text {color:#166534;}

    /* Hide print header in browser */
    .print-header {
      display: none;
    }

    /* Default (screen) */
    .no-print {
      display: block;
    }

    #printChecklist[hidden] {
      display: none !important;
    }

    #content,
    .check-item-content,
    .permit-button,
    .permit-meta {
      min-width: 0;
    }

    #content a,
    .check-item-content,
    .permit-meta {
      overflow-wrap: anywhere;
    }

    @media (max-width: 767px) {
      .filters-panel:not(.options-open) #permitListHeader {
        display: none;
      }

      .filters-panel.options-open #mobilePermitInlineLabel {
        display: none;
      }

      .filters-panel.options-open #mobilePermitControls {
        justify-content: flex-end;
      }

      .category-grid {
        display: grid !important;
        gap: 0.5rem;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .category-grid button {
        min-height: 44px;
        width: 100%;
        white-space: normal;
      }

      .content-toolbar {
        align-items: flex-start !important;
        flex-direction: column;
        gap: 0.75rem;
      }

      .content-toolbar .no-print {
        min-height: 44px;
        width: 100%;
      }

      .screen-title {
        font-size: 1.25rem !important;
        line-height: 1.3;
      }
    }

    /* PRINT STYLES */
@media print {

  @page {
    size: letter;
    margin: 0.4in;
  }

  html, body {
    margin: 0 !important;
    padding: 0 !important;
    font-size: 12px;
    line-height: 1.3;
  }

  .mb-6 { margin-bottom: 12px !important; }
  .mb-4 { margin-bottom: 10px !important; }
  .p-6 { padding: 10px !important; }
  .p-4 { padding: 8px !important; }
  .p-3 { padding: 6px !important; }

  #content > div {
    background: none !important;
    border: none !important;
    border-radius: 0 !important;
    padding: 0 !important;
    margin-bottom: 14px !important;
    border-top: 1px solid #999;
    padding-top: 8px !important;
    break-inside: auto;
    page-break-inside: auto;
  }

  #content > div:first-child {
    border-top: none;
    padding-top: 0 !important;
  }

  .print-divider {
    border-top: 1px solid #000;
    height: 0;
    margin-top: 8px;
  }

  #content > div h2 {
    font-size: 13px;
    margin-bottom: 6px !important;
    break-after: avoid;
    page-break-after: avoid;
  }

  #content > div h2 + * {
    break-before: avoid;
    page-break-before: avoid;
  }

  .section {
    margin-top: 10px !important;
  }

  .section.applications,
  .section.requirements,
  .section.inspections {
    margin-top: 18px !important;
  }

  .section-start {
    break-inside: avoid;
    page-break-inside: avoid;
  }

  #content .flex,
  #content .border.rounded.bg-white {
    background: none !important;
    border: none !important;
    padding: 4px 0 !important;
    margin-bottom: 6px !important;
    break-inside: avoid;
    page-break-inside: avoid;
  }

  #content .flex {
    gap: 6px !important;
  }

  #content .flex > div {
    margin: 0 !important;
  }

  .print-header {
    display: block;
    page-break-after: avoid;
    break-after: avoid;
    border-bottom: 1px solid #000 !important;
  }

  .screen-title {
    display: none !important;
  }

  .print-title {
    display: inline !important;
  }

  .no-print,
  #searchInput,
  #clearSearch,
  #toggleMoreOptions,
  #mobilePermitControls,
  #permitListHeader,
  #moreOptionsPanel,
  #propertyTypeFilter,
  #categoryTabs,
  #permitList {
    display: none !important;
  }

  main {
    display: block !important;
  }

  #content {
    margin-top: 10px;
    margin-bottom: 0 !important;
    padding: 0 !important;
    box-shadow: none !important;
  }

  p, li {
    orphans: 2;
    widows: 2;
  }

  input[type="checkbox"] {
    transform: scale(1.1);
  }

  a {
    color: black !important;
    text-decoration: none;
  }
}
  </style>
</head>

<body class="bg-gray-50 p-3 sm:p-4 md:p-6">
  <main class="app-shell max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-4 md:gap-6">

    <!-- LEFT PANEL -->
    <div class="filters-panel md:col-span-1 md:sticky md:top-6 self-start">
      <div class="screen-title md:hidden mb-3 text-xl font-semibold leading-tight">Permit Application Checklists</div>

      <div class="mb-3 sm:mb-4 flex gap-2">
        <input id="searchInput" placeholder="Search permit type..." class="min-h-11 w-full rounded border p-2" />
        <button id="clearSearch" aria-label="Clear search" class="min-h-11 rounded border bg-gray-100 px-3 text-sm">Clear</button>
      </div>

      <div id="mobilePermitControls" class="mb-3 flex items-center justify-between gap-3 md:hidden">
        <div id="mobilePermitInlineLabel" class="text-base font-semibold text-gray-700">Select Permit Type:</div>
        <button id="toggleMoreOptions" type="button" aria-controls="moreOptionsPanel" aria-expanded="false" class="min-h-10 shrink-0 rounded border bg-white px-3 text-sm font-medium text-gray-700 md:hidden">
          More Options
        </button>
      </div>

      <div id="moreOptionsPanel" class="hidden md:block mb-4 rounded border bg-white p-3 md:rounded-none md:border-0 md:bg-transparent md:p-0">
        <div class="mb-3 sm:mb-4">
          <select id="propertyTypeFilter" aria-label="Property Type Filter" class="min-h-11 w-full rounded border p-2 text-sm">
            <option value="All">All Property Types</option>
            <option value="Residential">Residential</option>
            <option value="Commercial">Commercial</option>
          </select>
        </div>

        <div id="categoryTabs"></div>
      </div>

      <div id="permitListHeader" class="mb-2 text-base font-semibold text-gray-700">Select Permit Type:</div>

      <div id="permitList" class="space-y-2 md:space-y-1 max-h-[30rem] md:max-h-[60vh] overflow-y-auto pr-1"></div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="md:col-span-3 min-w-0">
      <div class="content-toolbar flex justify-between items-center mb-4">
        <div class="screen-title hidden md:block text-2xl font-semibold">Permit Application Checklists</div>
        <button id="printChecklist" onclick="window.print()" hidden class="no-print px-4 py-2 city-blue-bg text-white rounded text-sm">
          Print Checklist
        </button>
      </div>

      <div id="content" class="rounded bg-white p-4 sm:p-6 shadow"></div>
    </div>

  </main>

<script>

// Data File (Development vs Production) //
const isLocal =
  window.location.hostname === "127.0.0.1" ||
  window.location.hostname === "localhost";
const DATA_FILE = isLocal
  ? "data/checklists.json"
  : "../../../../assets/json/checklists.json";
// Data File (Development vs Production) //

let state = {
  library: {},
  permits: [],
  selectedPermit: null,
  selectedFile: null,
  selectedCategory: null,
  activeCategory: "All",
  propertyType: "All"
};

function getTargetPermit() {
  const params = new URLSearchParams(window.location.search);
  const queryPermit = params.get("permit");
  const hash = window.location.hash.replace("#", "");
  return queryPermit || hash || null;
}

init();

function init() {
  loadData();
  bindSearch();
  bindPropertyFilter();
  bindMobileOptions();
}

function loadData() {
  fetch(DATA_FILE)
    .then(r => r.json())
    .then(data => {
      state.library = data.library || {};
      state.permits = data.permits || [];

      const target = getTargetPermit();
      let shouldScrollToContent = false;

      if (target) {
        const match = state.permits.find(p => p.file === target);
        if (match) {
          state.selectedPermit = match;
          state.selectedFile = match.file;
          state.selectedCategory = match.category;
          shouldScrollToContent = true;
        }
      }

      renderAll();

      if (shouldScrollToContent) {
        scrollSelectedPermitIntoView("auto");
        scrollToContentOnMobile("auto");
      }
    });
}

function bindSearch() {
  const input = document.getElementById("searchInput");
  const clearBtn = document.getElementById("clearSearch");

  input.addEventListener("input", () => {
    state.activeCategory = "All";
    renderAll();
  });

  clearBtn.addEventListener("click", () => {
    input.value = "";
    state.activeCategory = "All";
    state.selectedPermit = null;
    state.selectedFile = null;
    state.selectedCategory = null;

    const url = new URL(window.location);
    url.searchParams.delete("permit");
    url.hash = "";
    window.history.replaceState({}, "", url);

    renderAll();
    closeMobileOptions();
  });
}

function bindPropertyFilter() {
  document.getElementById("propertyTypeFilter").addEventListener("change", (e) => {
    state.propertyType = e.target.value;
    renderPermitList();
    closeMobileOptions();
  });
}

function bindMobileOptions() {
  const button = document.getElementById("toggleMoreOptions");
  if (!button) return;

  button.addEventListener("click", () => {
    const isOpen = button.getAttribute("aria-expanded") === "true";
    setMobileOptionsOpen(!isOpen);
  });

  window.addEventListener("resize", () => {
    if (window.matchMedia("(min-width: 768px)").matches) {
      setMobileOptionsOpen(false);
    }
  });
}

function setMobileOptionsOpen(isOpen) {
  const button = document.getElementById("toggleMoreOptions");
  const panel = document.getElementById("moreOptionsPanel");
  if (!button || !panel) return;

  button.setAttribute("aria-expanded", String(isOpen));
  button.textContent = isOpen ? "Hide Options" : "More Options";
  panel.classList.toggle("hidden", !isOpen);

  const filtersPanel = panel.closest(".filters-panel");
  if (filtersPanel) {
    filtersPanel.classList.toggle("options-open", isOpen);
  }
}

function closeMobileOptions() {
  if (window.matchMedia("(max-width: 767px)").matches) {
    setMobileOptionsOpen(false);
  }
}

function scrollToContentOnMobile(behavior = "smooth") {
  if (!window.matchMedia("(max-width: 767px)").matches) return;

  requestAnimationFrame(() => {
    document.getElementById("content").scrollIntoView({
      behavior,
      block: "start"
    });
  });
}

function scrollToContentOnDesktop(behavior = "smooth") {
  if (!window.matchMedia("(min-width: 768px)").matches) return;

  requestAnimationFrame(() => {
    window.scrollTo({
      top: 0,
      behavior,
    });
  });
}

function scrollSelectedPermitIntoView(behavior = "auto") {
  requestAnimationFrame(() => {
    const container = document.getElementById("permitList");
    if (!container) return;

    const selected = container.querySelector(".permit-button[aria-current='true']");
    if (!selected) return;

    const targetTop = selected.offsetTop - container.offsetTop - (container.clientHeight * 0.065);
    container.scrollTo({
      top: Math.max(0, targetTop),
      behavior
    });
  });
}

function getCategories(permit) {
  return Array.isArray(permit.category)
    ? permit.category
    : [permit.category || "Other"];
}

function renderAll() {
  renderCategoryTabs();
  renderPermitList();
  renderPrintButton();
  renderContent();
}

function renderPrintButton() {
  const button = document.getElementById("printChecklist");
  if (!button) return;

  button.hidden = !state.selectedPermit;
}

function renderCategoryTabs() {
  const container = document.getElementById("categoryTabs");
  container.innerHTML = "";

  const categories = new Set();
  state.permits.forEach(p => {
    getCategories(p).forEach(c => {
      if (c) categories.add(c.trim());
    });
  });

  const allBtn = document.createElement("button");
  allBtn.className = `w-full min-h-11 mb-2 px-3 py-2 rounded border text-sm ${state.activeCategory === "All" ? "city-blue-bg text-white" : "bg-white"}`;
  allBtn.textContent = "All";
  allBtn.onclick = () => {
    state.activeCategory = "All";
    renderAll();
    closeMobileOptions();
  };
  container.appendChild(allBtn);

  const grid = document.createElement("div");
  grid.className = "category-grid grid grid-cols-2 gap-2";

  Array.from(categories).sort().forEach(cat => {
    const btn = document.createElement("button");
    btn.className = `min-h-11 px-3 py-2 rounded border text-sm ${state.activeCategory === cat ? "city-blue-bg text-white" : "bg-white"}`;
    btn.textContent = cat;
    btn.onclick = () => {
      state.activeCategory = cat;
      renderAll();
      closeMobileOptions();
    };
    grid.appendChild(btn);
  });

  container.appendChild(grid);
}

function renderPermitList() {
  const container = document.getElementById("permitList");
  const filter = document.getElementById("searchInput").value.toLowerCase();

  container.innerHTML = "";

  const filtered = state.permits.filter(p => {
    const matchesSearch = p.name.toLowerCase().includes(filter);

    const matchesCategory =
      state.activeCategory === "All" ||
      getCategories(p).includes(state.activeCategory);

    const matchesProperty =
      state.propertyType === "All" ||
      !p.propertyType ||
      p.propertyType.includes(state.propertyType);

    return matchesSearch && matchesCategory && matchesProperty;
  });

  if (!filtered.length) {
    container.innerHTML = `<div class="text-gray-500 text-center">No results</div>`;
    return;
  }

  filtered.forEach(permit => {
    const btn = document.createElement("button");
    const isSelected = state.selectedFile === permit.file;

    const category = getCategories(permit).join(", ");
    const property = (permit.propertyType || []).join(", ");

    btn.className = `permit-button w-full text-left rounded border px-3 py-3 md:py-2 transition-colors ${isSelected ? "city-blue-bg text-white" : "bg-white hover:bg-gray-100"}`;
    if (isSelected) {
      btn.setAttribute("aria-current", "true");
    }

    btn.innerHTML = `
      <div class="font-medium leading-snug">${permit.name}</div>
      <div class="permit-meta text-xs mt-1 ${isSelected ? "text-white" : "text-gray-500"}">
        ${category}${property ? " - " + property : ""}
      </div>
    `;

    btn.onclick = () => {
      state.selectedPermit = permit;
      state.selectedFile = permit.file;
      state.selectedCategory = permit.category;

      // Update URL.
      const url = new URL(window.location);
      url.searchParams.set("permit", permit.file);
      window.history.replaceState({}, "", url);

      renderAll();
      scrollSelectedPermitIntoView("smooth");
      scrollToContentOnMobile("smooth");
      scrollToContentOnDesktop("smooth");
    };

    container.appendChild(btn);
  });
}

window.addEventListener("hashchange", () => {
  const target = getTargetPermit();
  if (!target) return;

  const match = state.permits.find(p => p.file === target);
  if (match) {
    state.selectedPermit = match;
    state.selectedFile = match.file;
    state.selectedCategory = match.category;
    renderAll();
    scrollSelectedPermitIntoView("auto");
    scrollToContentOnMobile("auto");
    scrollToContentOnDesktop("auto");
  }
});

function formatDate(dateStr) {
  if (!dateStr) return "";
  const [year, month, day] = dateStr.split("-");
  return `${month}/${day}/${year}`;
}

function renderContent() {
  const container = document.getElementById("content");

  if (!state.selectedPermit) {
    container.innerHTML = `
      <div class="text-gray-600">
        <div class="text-lg font-semibold mb-2">Choose a Permit Type</div>
        <p>Use the Select Permit Type list to open a checklist with application requirements, documents, and inspection details.</p>
        <p class="mt-2 text-sm text-gray-500">Search by the name of the permit type, or use More Options to filter down by property type and permit group.</p>
      </div>
    `;
    return;
  }

  const data = state.selectedPermit;

    let html = `
      <!-- PRINT HEADER -->
      <div class="print-header mb-3">
        <div class="flex items-center justify-between border-b pb-2">
          
          <div class="flex items-center gap-3">
            <img src="https://www.pompanobeachfl.gov/pompanobeachfl/assets/images/sitewide/COPB_Logo.png" 
                class="h-12 w-auto" />

            <div>
              <div class="font-bold text-lg">City of Pompano Beach</div>
              <div class="text-sm text-gray-600">Building Department</div>
            </div>
          </div>

          <div class="text-right text-sm text-gray-600">
            <div>100 W. Atlantic Blvd</div>
            <div>Pompano Beach, FL 33060</div>
            <div>954.786.4669</div>
          </div>
        </div>

      <div class="text-2xl font-semibold">
        <span class="screen-title">Permit Application Checklists</span>
      </div>
      <div class="print-divider"></div>
      </div>

<div class="permit-heading mb-4 flex flex-col sm:flex-row sm:justify-between sm:items-end gap-1 sm:gap-4">
  <div class="text-lg sm:text-xl font-semibold leading-snug">
    ${data.name}
    <span class="print-title hidden"> - Permit Checklist</span>
  </div>

  ${data.lastUpdated ? `
    <div class="text-xs text-gray-500 italic shrink-0">
      Updated: ${formatDate(data.lastUpdated)}
    </div>
  ` : ""}
</div>
    `;

  const whenPermitRequired = data.whenPermitRequired;
  const hint = data.hint;

  if (whenPermitRequired) {
    html += `
      <div class="mb-4 p-4 rounded border-l-4 city-blue-border city-bg-blue-50 text-sm text-gray-700">
        <div class="font-semibold city-blue-text mb-1">When do I need a Permit?</div>
        <div>${whenPermitRequired}</div>
      </div>
    `;
  }

  if (hint) {
    html += `
      <div class="mb-4 p-4 rounded border-l-4 hint-border hint-bg text-sm text-gray-700">
        <div class="font-semibold hint-text mb-1">Hint</div>
        <div>${hint}</div>
      </div>
    `;
  }

  data.sections.forEach(section => {
    html += `<div class="section-card mb-4 sm:mb-6 border rounded-lg p-3 sm:p-4 bg-gray-50">`;

    let firstItem = true;

    html += `<div class="section-start">
      <h2 class="font-semibold mb-3">${section.name}</h2>`;

section.items.forEach(item => {

  let blockHtml = "";

  if (item.type === "inspection_group") {
    blockHtml = `
      <div class="inspection-group mb-3 sm:mb-4 p-3 sm:p-4 border rounded bg-white">
        <div class="font-semibold mb-2">${item.label}</div>
        <ol class="list-decimal ml-5 space-y-1 text-sm">
          ${item.inspections.map(i => `<li>${i}</li>`).join("")}
        </ol>
      </div>
    `;
  } else {
    let name = "";
    let description = "";
    let links = [];

    if (item.type === "requirement") {
      name = item.label || item.value || "";
      description = item.description || "";
      links = item.links || [];
    } else {
      const req = state.library[item.id] || {};
      name = req.name || item.id || "";
      description = item.description || req.description || "";
      links = item.links || req.links || [];
    }

    blockHtml = `
      <div class="check-item flex items-start gap-3 p-3 mb-2 border rounded bg-white">
        <input type="checkbox" class="mt-1 w-4 h-4 shrink-0" />
        <div class="check-item-content">
          <div class="font-medium">${name}</div>
          ${description ? `<div class="text-sm text-gray-500 mt-1">${description}</div>` : ""}
          ${links.length ? `
            <div class="mt-1 text-sm">
              ${links.map(l => `<a href="${l.url}" target="_blank" class="text-blue-600 underline">${l.label}</a>`).join("<br>")}
            </div>
          ` : ""}
        </div>
      </div>
    `;
  }

  if (firstItem) {
    html += blockHtml + `</div>`; // closes .section-start
    firstItem = false;
  } else {
    html += blockHtml;
  }

});

    html += `</div>`;
  });

if (data.noticeOfCommencement) {
  html += `
    <div class="mt-8 p-4 border-l-4 border-yellow-500 bg-yellow-50 text-sm text-gray-700 rounded">
      <div class="font-semibold text-yellow-700 mb-1">Notice of Commencement</div>
      <div>${data.noticeOfCommencement}</div>
    </div>
  `;
}

  html += `
    <div class="mt-6 text-sm text-gray-500 text-center">
      <i>Each project is unique. Additional information or documentation may be required based on the scope of work.</i>
    </div>
  `;

  container.innerHTML = html;
}

</script>
</body>
</html>
