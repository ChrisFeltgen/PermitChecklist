<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Permit Application Checklists</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Standard Style */
    .city-blue-bg {background-color:#2A768D;}
    .city-bg-blue-50 {background-color:rgba(42, 118, 141, 0.2);}
    .city-blue-border {border-color:#2A768D;}
    .city-blue-text {color:#2A768D;}

    /* Hide print header in browser */
    .print-header {
      display: none;
    }

    /* Default (screen) */
    .no-print {
      display: block;
    }

    /* PRINT STYLES */
@media print {

  @page {
    size: letter;
    margin: 0.4in;
  }

  html, body {
    margin: 0 !important;
    padding: 0 !important;
    font-size: 11px;
    line-height: 1.3;
  }

  .mb-6 { margin-bottom: 12px !important; }
  .mb-4 { margin-bottom: 10px !important; }
  .p-6 { padding: 10px !important; }
  .p-4 { padding: 8px !important; }
  .p-3 { padding: 6px !important; }

  h2 {
    font-size: 13px;
    margin-bottom: 6px !important;
    break-after: avoid;
    page-break-after: avoid;
  }

  .print-header {
    display: block;
    page-break-after: avoid;
    break-after: avoid;
  }

  .screen-title {
    display: none !important;
  }

  .print-title {
    display: inline !important;
  }

  .no-print,
  #searchInput,
  #clearSearch,
  #propertyTypeFilter,
  #categoryTabs,
  #permitList {
    display: none !important;
  }

  main {
    display: block !important;
  }

  #content {
    margin-top: 10px;
    margin-bottom: 0 !important;
    padding: 0 !important;
    box-shadow: none !important;
  }

  #content .flex,
  #content .border.rounded.bg-white {
    break-inside: avoid;
    page-break-inside: avoid;
  }

  p, li {
    orphans: 2;
    widows: 2;
  }

  input[type="checkbox"] {
    transform: scale(1.1);
  }

  a {
    color: black !important;
    text-decoration: none;
  }
}
  </style>
</head>

<body class="bg-gray-50 p-6">
  <main class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-6">

    <!-- LEFT PANEL -->
    <div class="md:col-span-1">

      <div class="mb-4 flex gap-2">
        <input id="searchInput" placeholder="Search permit type..." class="w-full rounded border p-2" />
        <button id="clearSearch" class="rounded border bg-gray-100 px-3">x</button>
      </div>

      <div class="mb-4">
        <select id="propertyTypeFilter" aria-label="Proptery Type Filter" class="w-full rounded border p-2 text-sm">
          <option value="All">All Property Types</option>
          <option value="Residential">Residential</option>
          <option value="Commercial">Commercial</option>
        </select>
      </div>

      <div id="categoryTabs" class="mb-4"></div>

      <div id="permitList" class="space-y-1 max-h-[60vh] overflow-y-auto"></div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="md:col-span-3">
      <div class="flex justify-between items-center mb-4">
        <div class="screen-title text-2xl font-semibold">Permit Application Checklists</div>
        <button onclick="window.print()" class="no-print px-4 py-2 city-blue-bg text-white rounded text-sm">
          Print Checklist
        </button>
      </div>

      <div id="content" class="rounded bg-white p-6 shadow"></div>
    </div>

  </main>

<script>


// Data File (Development vs Production)
const isLocal =
  window.location.hostname === "127.0.0.1" ||
  window.location.hostname === "localhost";
const DATA_FILE = isLocal
  ? "data/checklists.json"
  : "../../../../assets/json/checklists.json";
// Data File (Development vs Production)


let state = {
  library: {},
  permits: [],
  selectedPermit: null,
  selectedFile: null,
  selectedCategory: null,
  activeCategory: "All",
  propertyType: "All"
};

function getTargetPermit() {
  const params = new URLSearchParams(window.location.search);
  const queryPermit = params.get("permit");
  const hash = window.location.hash.replace("#", "");
  return queryPermit || hash || null;
}

init();

function init() {
  loadData();
  bindSearch();
  bindPropertyFilter();
}

function loadData() {
  fetch(DATA_FILE)
    .then(r => r.json())
    .then(data => {
      state.library = data.library || {};
      state.permits = data.permits || [];

      const target = getTargetPermit();
      if (target) {
        const match = state.permits.find(p => p.file === target);
        if (match) {
          state.selectedPermit = match;
          state.selectedFile = match.file;
          state.selectedCategory = match.category;
        }
      }

      renderAll();
    });
}

function bindSearch() {
  const input = document.getElementById("searchInput");
  const clearBtn = document.getElementById("clearSearch");

  input.addEventListener("input", () => {
    state.activeCategory = "All";
    renderAll();
  });

  clearBtn.addEventListener("click", () => {
    input.value = "";
    state.activeCategory = "All";
    state.selectedPermit = null;
    renderAll();
  });
}

function bindPropertyFilter() {
  document.getElementById("propertyTypeFilter").addEventListener("change", (e) => {
    state.propertyType = e.target.value;
    renderPermitList();
  });
}

function getCategories(permit) {
  return Array.isArray(permit.category)
    ? permit.category
    : [permit.category || "Other"];
}

function renderAll() {
  renderCategoryTabs();
  renderPermitList();
  renderContent();
}

function renderCategoryTabs() {
  const container = document.getElementById("categoryTabs");
  container.innerHTML = "";

  const categories = new Set();
  state.permits.forEach(p => {
    getCategories(p).forEach(c => {
      if (c) categories.add(c.trim());
    });
  });

  const allBtn = document.createElement("button");
  allBtn.className = `w-full mb-2 px-3 py-2 rounded border text-sm ${state.activeCategory === "All" ? "city-blue-bg text-white" : "bg-white"}`;
  allBtn.textContent = "All";
  allBtn.onclick = () => { state.activeCategory = "All"; renderAll(); };
  container.appendChild(allBtn);

  const grid = document.createElement("div");
  grid.className = "grid grid-cols-2 gap-2";

  Array.from(categories).sort().forEach(cat => {
    const btn = document.createElement("button");
    btn.className = `px-3 py-2 rounded border text-sm ${state.activeCategory === cat ? "city-blue-bg text-white" : "bg-white"}`;
    btn.textContent = cat;
    btn.onclick = () => { state.activeCategory = cat; renderAll(); };
    grid.appendChild(btn);
  });

  container.appendChild(grid);
}

function renderPermitList() {
  const container = document.getElementById("permitList");
  const filter = document.getElementById("searchInput").value.toLowerCase();

  container.innerHTML = "";

  const filtered = state.permits.filter(p => {
    const matchesSearch = p.name.toLowerCase().includes(filter);

    const matchesCategory =
      state.activeCategory === "All" ||
      getCategories(p).includes(state.activeCategory);

    const matchesProperty =
      state.propertyType === "All" ||
      !p.propertyType ||
      p.propertyType.includes(state.propertyType);

    return matchesSearch && matchesCategory && matchesProperty;
  });

  if (!filtered.length) {
    container.innerHTML = `<div class="text-gray-500 text-center">No results</div>`;
    return;
  }

  filtered.forEach(permit => {
    const btn = document.createElement("button");
    const isSelected = state.selectedFile === permit.file;

    const category = permit.category;
    const property = (permit.propertyType || []).join(", ");

    btn.className = `w-full text-left rounded border px-3 py-2 ${isSelected ? "city-blue-bg text-white" : "hover:bg-gray-100"}`;

    btn.innerHTML = `
      <div>${permit.name}</div>
      <div class="text-xs ${isSelected ? "white-text" : "text-gray-500"}">
        ${category}${property ? " • " + property : ""}
      </div>
    `;

    btn.onclick = () => {
      state.selectedPermit = permit;
      state.selectedFile = permit.file;
      state.selectedCategory = permit.category;

      // 🔥 UPDATE URL
      const url = new URL(window.location);
      url.searchParams.set("permit", permit.file);
      window.history.replaceState({}, "", url);

      renderAll();
    };

    container.appendChild(btn);
  });
}

window.addEventListener("hashchange", () => {
  const target = getTargetPermit();
  if (!target) return;

  const match = state.permits.find(p => p.file === target);
  if (match) {
    state.selectedPermit = match;
    state.selectedFile = match.file;
    state.selectedCategory = match.category;
    renderAll();
  }
});

function renderContent() {
  const container = document.getElementById("content");

  if (!state.selectedPermit) {
    container.innerHTML = `
      <div class="text-gray-600">
        <div class="text-lg font-semibold mb-2">Select a Permit</div>
        <p>Select a permit from the list to view application requirements and checklist details.</p>
        <p class="mt-2 text-sm text-gray-500">Use search or filters to locate a specific permit type.</p>
      </div>
    `;
    return;
  }

  const data = state.selectedPermit;

    let html = `
      <!-- PRINT HEADER -->
      <div class="print-header mb-3">
        <div class="flex items-center justify-between border-b pb-2">
          
          <div class="flex items-center gap-3">
            <img src="https://www.pompanobeachfl.gov/pompanobeachfl/assets/images/sitewide/COPB_Logo.png" 
                class="h-12 w-auto" />

            <div>
              <div class="font-bold text-lg">City of Pompano Beach</div>
              <div class="text-sm text-gray-600">Building Department</div>
            </div>
          </div>

          <div class="text-right text-sm text-gray-600">
            <div>100 W. Atlantic Blvd</div>
            <div>Pompano Beach, FL 33060</div>
            <div>954.786.4669</div>
          </div>
        </div>

      <div class="text-2xl font-semibold">
        <span class="screen-title">Permit Application Checklists</span>
      </div>
      </div>

      <div class="mb-4 text-xl font-semibold">${data.name}<span class="print-title hidden"> - Permit Checklist</span></div>
    `;

  if (data.guidance) {
    html += `
      <div class="mb-4 p-4 rounded border-l-4 city-blue-border city-bg-blue-50 text-sm text-gray-700">
        <div class="font-semibold city-blue-text mb-1">When do I need a Permit?</div>
        <div>${data.guidance}</div>
      </div>
    `;
  }

  data.sections.forEach(section => {
    html += `<div class="mb-6 border rounded-lg p-4 bg-gray-50">
      <h2 class="font-semibold mb-3">${section.name}</h2>`;

    section.items.forEach(item => {
      if (item.type === "inspection_group") {
        html += `
          <div class="mb-4 p-4 border rounded bg-white">
            <div class="font-semibold mb-2">${item.label}</div>
            <ol class="list-decimal ml-5 space-y-1 text-sm">
              ${item.inspections.map(i => `<li>${i}</li>`).join("")}
            </ol>
          </div>
        `;
        return;
      }
      let name = "";
      let description = "";
      let links = [];

      if (item.type === "requirement") {
        name = item.label || item.value || "";
        description = item.description || "";
        links = item.links || [];
      } else {
        const req = state.library[item.id] || {};
        name = req.name || item.id || "";
        description = item.description || req.description || "";
        links = item.links || req.links || [];
      }

      html += `
        <div class="flex items-start gap-3 p-3 mb-2 border rounded bg-white">
          <input type="checkbox" class="mt-1 w-4 h-4" />
          <div>
            <div class="font-medium">${name}</div>
            ${description ? `<div class="text-sm text-gray-500 mt-1">${description}</div>` : ""}
            ${links.length ? `
              <div class="mt-1 text-sm">
                ${links.map(l => `<a href="${l.url}" target="_blank" class="text-blue-600 underline">${l.label}</a>`).join("<br>")}
              </div>
            ` : ""}
          </div>
        </div>
      `;
    });

    html += `</div>`;
  });

if (data.noticeOfCommencement) {
  html += `
    <div class="mt-8 p-4 border-l-4 border-yellow-500 bg-yellow-50 text-sm text-gray-700 rounded">
      <div class="font-semibold text-yellow-700 mb-1">Notice of Commencement</div>
      <div>${data.noticeOfCommencement}</div>
    </div>
  `;
}

  html += `
    <div class="mt-6 text-sm text-gray-500 text-center">
      <i>Each project is unique. Additional information or documentation may be required based on the scope of work.</i>
    </div>
  `;

  container.innerHTML = html;
}

</script>
</body>
</html>
