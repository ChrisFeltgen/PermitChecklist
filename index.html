<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Permit Application Checklists</title>
  <link href="https://legacy.pompanobeachfl.gov/assets/css/03_page_specific/internal/tailwind.css" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    /* Standard Style */
    .city-blue-bg {background-color:#2A768D;}
    .city-bg-blue-50 {background-color:rgba(42, 118, 141, 0.2);}
    .city-blue-border {border-color:#2A768D;}
    .city-blue-text {color:#2A768D;}
    .hint-bg {background-color:rgba(22, 163, 74, 0.12);}
    .hint-border {border-color:#16A34A;}
    .hint-text {color:#166534;}

    :root {
      --city-blue: #2A768D;
      --city-green: #66A785;
      --city-ink: #1f2933;
    }

    .show-on-focus {
      position: fixed;
      top: -10em;
      left: 1rem;
      z-index: 999;
      background: #fff;
      color: var(--city-ink);
      padding: 0.75rem 1rem;
      font-weight: 700;
      outline: 2px solid transparent;
    }

    .show-on-focus:focus {
      top: 1rem;
      outline-color: #ffb715;
    }

    .city-site-header {
      position: relative;
      z-index: 20;
      background: #fff;
      border-bottom: 1px solid #d7e2e6;
      box-shadow: 0 2px 10px rgba(31, 41, 51, 0.08);
    }

    .city-site-header__main {
      min-height: 96px;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0.2rem 3% 0.45rem;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 1rem;
    }

    .city-brand {
      display: flex;
      align-items: center;
      min-width: 0;
      color: #111827;
      text-decoration: none;
      background: #fff;
    }

    .city-brand:hover,
    .city-brand:focus-visible {
      color: var(--city-blue);
    }

    .city-brand__logo {
      width: auto;
      height: 82px;
      flex: 0 0 auto;
      padding: 0.35rem 1.25rem 0.35rem 0;
    }

    .city-brand__divider {
      width: 3px;
      height: 68px;
      flex: 0 0 auto;
      background: var(--city-blue);
    }

    .city-brand__welcome {
      padding-left: 1.25rem;
      line-height: 1.03;
      font-size: clamp(1.85rem, 3vw, 2.85rem);
      font-weight: 700;
      white-space: nowrap;
    }

    .city-brand__welcome span {
      display: block;
      font-weight: 400;
    }

    .city-brand__welcome strong {
      display: block;
      font-weight: 700;
    }

    .city-nav {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.15rem;
      margin-left: auto;
    }

    .city-nav a,
    .mobile-menu__panel a {
      color: #111827;
      text-decoration: none;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.08rem;
    }

    .city-nav a {
      display: inline-flex;
      align-items: center;
      min-height: 96px;
      padding: 0 0.7rem;
      font-size: 0.98rem;
    }

    .city-nav a:hover,
    .city-nav a:focus-visible,
    .mobile-menu__panel a:hover,
    .mobile-menu__panel a:focus-visible {
      color: var(--city-blue);
    }

    .mobile-menu {
      display: none;
      position: relative;
      align-self: center;
    }

    .mobile-menu summary {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      cursor: pointer;
      list-style: none;
      border: 1px solid #cbd5dc;
      border-radius: 4px;
      background: #fff;
    }

    .mobile-menu summary::-webkit-details-marker {
      display: none;
    }

    .mobile-menu__label {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .mobile-menu__icon,
    .mobile-menu__icon::before,
    .mobile-menu__icon::after {
      display: block;
      width: 21px;
      height: 2px;
      background: #111827;
      content: "";
    }

    .mobile-menu__icon {
      position: relative;
    }

    .mobile-menu__icon::before,
    .mobile-menu__icon::after {
      position: absolute;
      left: 0;
    }

    .mobile-menu__icon::before {
      top: -7px;
    }

    .mobile-menu__icon::after {
      top: 7px;
    }

    .mobile-menu__panel {
      position: absolute;
      top: calc(100% + 0.65rem);
      right: 0;
      width: min(18rem, calc(100vw - 2rem));
      padding: 0.35rem 0;
      border: 1px solid #d7e2e6;
      border-radius: 4px;
      background: #fff;
      box-shadow: 0 14px 34px rgba(31, 41, 51, 0.16);
    }

    .mobile-menu__panel a {
      display: block;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid #edf2f4;
      font-size: 0.9rem;
    }

    .mobile-menu__panel a:last-child {
      border-bottom: 0;
    }

    .city-dept-bar {
      background: var(--city-blue);
      color: #fff;
    }

    .city-dept-bar__inner {
      max-width: 1280px;
      min-height: 40px;
      margin: 0 auto;
      padding: 0 3%;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02rem;
    }

    .city-dept-bar a {
      color: #fff;
      text-decoration: none;
      font-weight: 800;
    }

    .city-dept-bar a:hover,
    .city-dept-bar a:focus-visible {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .city-dept-bar__separator {
      opacity: 0.75;
    }

    /* Hide print header in browser */
    .print-header {
      display: none;
    }

    /* Default (screen) */
    .no-print {
      display: block;
    }

    #printChecklist[hidden] {
      display: none !important;
    }

    button:not(:disabled),
    summary,
    a[href],
    [role="button"]:not([aria-disabled="true"]) {
      cursor: pointer;
    }

    #content,
    .check-item-content,
    .permit-button,
    .permit-meta {
      min-width: 0;
    }

    #content a,
    .check-item-content,
    .permit-meta {
      overflow-wrap: anywhere;
    }

    .permit-button__name {
      font-weight: 500;
    }

    .special-requirement--notice {
      background: #fffbeb;
      border-color: #fbbf24;
      border-left: 4px solid #f59e0b;
    }

    .special-requirement--notice .special-requirement__title {
      color: #92400e;
    }

    .filters-panel:not(.options-open) #permitListHeader {
      display: none;
    }

    .filters-panel {
      min-height: 0;
    }

    #permitList {
      min-height: 0;
      max-height: 30rem;
    }

    #permitList,
    #checklistPanel {
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
    }

    @media (min-width: 768px) {
      #permitList {
        max-height: calc(100dvh - 16rem);
      }

      #checklistPanel {
        overflow-y: auto;
      }
    }

    @media (max-width: 767px) {
      .category-grid {
        display: grid !important;
        gap: 0.5rem;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .category-grid button {
        min-height: 44px;
        width: 100%;
        white-space: normal;
      }

      .content-toolbar {
        align-items: flex-start !important;
        flex-direction: column;
        gap: 0.75rem;
      }

      .content-toolbar .no-print {
        min-height: 44px;
        width: 100%;
      }

      .screen-title {
        font-size: 1.25rem !important;
        line-height: 1.3;
      }
    }

    @media (max-width: 1100px) {
      .city-nav {
        display: none;
      }

      .mobile-menu {
        display: block;
      }
    }

    @media (max-width: 767px) {
      .city-site-header__main {
        min-height: 64px;
        padding: 0.2rem 0.75rem 0.4rem;
        gap: 0.5rem;
      }

      .city-brand__logo {
        height: 54px;
        padding: 0.25rem 0.6rem 0.25rem 0;
      }

      .city-brand__divider {
        height: 42px;
        width: 2px;
      }

      .city-brand__welcome {
        padding-left: 0.6rem;
        font-size: clamp(1.05rem, 4.6vw, 1.45rem);
      }

      .city-dept-bar__inner {
        min-height: 34px;
        padding: 0 0.75rem;
        gap: 0.45rem;
        font-size: 0.78rem;
      }

      .mobile-menu summary {
        width: 40px;
        height: 40px;
      }
    }

    @media (max-width: 480px) {
      .city-brand__divider,
      .city-brand__welcome {
        display: none;
      }

      .city-brand__logo {
        height: 50px;
        padding-right: 0;
      }

      .city-dept-bar__inner {
        justify-content: flex-start;
      }
    }

    /* PRINT STYLES */
@media print {

  @page {
    size: letter;
    margin: 0.4in;
  }

  html, body {
    margin: 0 !important;
    padding: 0 !important;
    font-size: 12px;
    line-height: 1.3;
  }

  .mb-6 { margin-bottom: 12px !important; }
  .mb-4 { margin-bottom: 10px !important; }
  .p-6 { padding: 10px !important; }
  .p-4 { padding: 8px !important; }
  .p-3 { padding: 6px !important; }

  #content > div {
    background: none !important;
    border: none !important;
    border-radius: 0 !important;
    padding: 0 !important;
    margin-bottom: 14px !important;
    border-top: 1px solid #999;
    padding-top: 8px !important;
    break-inside: auto;
    page-break-inside: auto;
  }

  #content > div:first-child {
    border-top: none;
    padding-top: 0 !important;
  }

  .print-divider {
    border-top: 1px solid #000;
    height: 0;
    margin-top: 8px;
  }

  #content > div h2 {
    font-size: 13px;
    margin-bottom: 6px !important;
    break-after: avoid;
    page-break-after: avoid;
  }

  #content > div h2 + * {
    break-before: avoid;
    page-break-before: avoid;
  }

  .section {
    margin-top: 10px !important;
  }

  .section.applications,
  .section.requirements,
  .section.inspections {
    margin-top: 18px !important;
  }

  .section-start {
    break-inside: avoid;
    page-break-inside: avoid;
  }

  #content .flex,
  #content .border.rounded.bg-white {
    background: none !important;
    border: none !important;
    padding: 4px 0 !important;
    margin-bottom: 6px !important;
    break-inside: avoid;
    page-break-inside: avoid;
  }

  #content .flex {
    gap: 6px !important;
  }

  #content .flex > div {
    margin: 0 !important;
  }

  #content .check-item-content > .font-medium {
    font-weight: 700 !important;
  }

  .print-header {
    display: block;
    page-break-after: avoid;
    break-after: avoid;
    border-bottom: 1px solid #000 !important;
  }

  .screen-title {
    display: none !important;
  }

  .print-title {
    display: inline !important;
  }

  .no-print,
  #searchInput,
  #clearSearch,
  #toggleMoreOptions,
  #permitOptionsControls,
  #permitListHeader,
  #moreOptionsPanel,
  #propertyTypeFilter,
  #categoryTabs,
  #permitList {
    display: none !important;
  }

  main {
    display: block !important;
  }

  #checklistPanel {
    max-height: none !important;
    overflow: visible !important;
  }

  #content {
    margin-top: 10px;
    margin-bottom: 0 !important;
    padding: 0 !important;
    box-shadow: none !important;
  }

  p, li {
    orphans: 2;
    widows: 2;
  }

  input[type="checkbox"] {
    transform: scale(1.1);
  }

  a {
    color: #2563eb !important;
    text-decoration: underline !important;
    text-underline-offset: 2px;
    text-decoration-thickness: 1.5px;
    font-weight: 600;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
}
  </style>
</head>

<body class="bg-gray-50">
<header class="city-site-header no-print">
  <a class="show-on-focus" href="#content">Skip to Content</a>

  <div class="city-site-header__main">
    <a class="city-brand" href="https://www.pompanobeachfl.gov/" aria-label="City of Pompano Beach home">
      <img
        src="https://www.pompanobeachfl.gov/pompanobeachfl/assets/images/sitewide/COPB_Logo.png"
        alt="City of Pompano Beach Logo"
        class="city-brand__logo"
      />
      <span class="city-brand__divider" aria-hidden="true"></span>
      <span class="city-brand__welcome">
        <span>Welcome to</span>
        <strong>Pompano Beach</strong>
      </span>
    </a>

    <nav class="city-nav" aria-label="City navigation">
      <a href="https://www.pompanobeachfl.gov/government">Government</a>
      <a href="https://www.pompanobeachfl.gov/residents">Residents</a>
      <a href="https://www.visitpompanobeach.com/">Visitors</a>
      <a href="https://www.pompanobeachfl.gov/business">Business</a>
      <a href="https://www.pompanobeachfl.gov/search">Search</a>
    </nav>

    <details class="mobile-menu">
      <summary aria-label="Toggle navigation">
        <span class="mobile-menu__label">Menu</span>
        <span class="mobile-menu__icon" aria-hidden="true"></span>
      </summary>
      <nav class="mobile-menu__panel" aria-label="Mobile city navigation">
        <a href="https://www.pompanobeachfl.gov/government">Government</a>
        <a href="https://www.pompanobeachfl.gov/residents">Residents</a>
        <a href="https://www.visitpompanobeach.com/">Visitors</a>
        <a href="https://www.pompanobeachfl.gov/business">Business</a>
        <a href="https://www.pompanobeachfl.gov/search">Search</a>
      </nav>
    </details>
  </div>

  <div class="city-dept-bar" aria-label="Building Department breadcrumb">
    <div class="city-dept-bar__inner">
      <a href="https://www.pompanobeachfl.gov/government/building-inspections">Building Department</a>
      <span class="city-dept-bar__separator" aria-hidden="true">/</span>
      <span>Permit Checklists</span>
    </div>
  </div>
</header>
<main class="app-shell max-w-7xl mx-auto p-3 sm:p-4 md:p-6 grid grid-cols-1 md:grid-cols-4 gap-4 md:gap-6">
    <!-- LEFT PANEL -->
    <div class="filters-panel md:col-span-1 md:sticky md:top-6 self-start">
      <div class="screen-title md:hidden mb-3 text-xl font-semibold leading-tight">Permit Application Checklists</div>

      <div class="mb-3 sm:mb-4 flex gap-2">
        <input id="searchInput" placeholder="Search permit type..." class="min-h-11 w-full rounded border p-2" />
        <button id="clearSearch" aria-label="Clear search" class="min-h-11 rounded border bg-gray-100 px-3 text-sm">Clear</button>
      </div>

      <div id="permitOptionsControls" class="mb-3 flex items-center justify-between gap-3">
        <div id="permitInlineLabel" class="text-base font-semibold text-gray-700">Select Permit Type:</div>
        <button id="toggleMoreOptions" type="button" aria-controls="moreOptionsPanel" aria-expanded="false" class="min-h-10 shrink-0 rounded border bg-white px-3 text-sm font-medium text-gray-700">
          More Options
        </button>
      </div>

      <div id="moreOptionsPanel" class="hidden mb-4 rounded border bg-white p-3">
        <div class="mb-3 sm:mb-4">
          <select id="propertyTypeFilter" aria-label="Property Type Filter" class="min-h-11 w-full rounded border p-2 text-sm">
            <option value="All">All Property Types</option>
            <option value="Residential">Residential</option>
            <option value="Commercial">Commercial</option>
          </select>
        </div>

        <div id="categoryTabs"></div>
      </div>

      <div id="permitListHeader" class="mb-2 text-base font-semibold text-gray-700">Select Permit Type:</div>

      <div id="permitList" class="space-y-2 md:space-y-1 overflow-y-auto pr-1"></div>

    </div>

    <!-- RIGHT PANEL -->
    <div id="checklistPanel" class="md:col-span-3 min-w-0">
      <div class="content-toolbar flex justify-between items-center mb-4">
        <div class="screen-title hidden md:block text-2xl font-semibold">Permit Application Checklists</div>
        <button id="printChecklist" onclick="window.print()" hidden class="no-print px-4 py-2 city-blue-bg text-white rounded text-sm">
          Print Checklist
        </button>
      </div>

      <div id="content" class="rounded bg-white p-4 sm:p-6 shadow"></div>
    </div>

  </main>

<script>

// Data File (Development vs Production) //
const isLocal =
  window.location.hostname === "127.0.0.1" ||
  window.location.hostname === "localhost";
const DATA_FILE = isLocal
  ? "data/checklists.json"
  : "../../../../assets/json/checklists.json";
// Data File (Development vs Production) //

let state = {
  library: {},
  permits: [],
  selectedPermit: null,
  selectedFile: null,
  selectedCategory: null,
  activeCategory: "All",
  propertyType: "All"
};

function getTargetPermit() {
  const params = new URLSearchParams(window.location.search);
  const queryPermit = params.get("permit");
  const hash = window.location.hash.replace("#", "");
  return queryPermit || hash || null;
}

init();

function init() {
  loadData();
  bindSearch();
  bindPropertyFilter();
  bindPermitOptions();
  bindPermitListSizing();
  bindEmptySpaceChecklistScrolling();
}

function loadData() {
  fetch(DATA_FILE)
    .then(r => r.json())
    .then(data => {
      state.library = data.library || {};
      state.permits = data.permits || [];

      const target = getTargetPermit();
      let shouldScrollToContent = false;

      if (target) {
        const match = state.permits.find(p => p.file === target);
        if (match) {
          state.selectedPermit = match;
          state.selectedFile = match.file;
          state.selectedCategory = match.category;
          shouldScrollToContent = true;
        }
      }

      renderAll();

      if (shouldScrollToContent) {
        scrollSelectedPermitIntoView("auto");
        scrollToContentOnMobile("auto");
      }
    });
}

function bindSearch() {
  const input = document.getElementById("searchInput");
  const clearBtn = document.getElementById("clearSearch");

  input.addEventListener("input", () => {
    state.activeCategory = "All";
    renderAll();
  });

  clearBtn.addEventListener("click", () => {
    input.value = "";
    state.activeCategory = "All";
    state.selectedPermit = null;
    state.selectedFile = null;
    state.selectedCategory = null;

    const url = new URL(window.location);
    url.searchParams.delete("permit");
    url.hash = "";
    window.history.replaceState({}, "", url);

    renderAll();
  });
}

function bindPropertyFilter() {
  document.getElementById("propertyTypeFilter").addEventListener("change", (e) => {
    state.propertyType = e.target.value;
    renderPermitList();
    syncScrollablePanelHeights();
  });
}

function bindPermitOptions() {
  const button = document.getElementById("toggleMoreOptions");
  if (!button) return;

  button.addEventListener("click", () => {
    const isOpen = button.getAttribute("aria-expanded") === "true";
    setPermitOptionsOpen(!isOpen);
  });
}

function setPermitOptionsOpen(isOpen) {
  const button = document.getElementById("toggleMoreOptions");
  const panel = document.getElementById("moreOptionsPanel");
  if (!button || !panel) return;

  button.setAttribute("aria-expanded", String(isOpen));
  button.textContent = isOpen ? "Hide Options" : "More Options";
  panel.classList.toggle("hidden", !isOpen);

  const filtersPanel = panel.closest(".filters-panel");
  if (filtersPanel) {
    filtersPanel.classList.toggle("options-open", isOpen);
  }

  syncScrollablePanelHeights();
}

function bindPermitListSizing() {
  window.addEventListener("resize", syncScrollablePanelHeights);
  window.addEventListener("scroll", syncScrollablePanelHeights, { passive: true });
}

function bindEmptySpaceChecklistScrolling() {
  document.addEventListener("wheel", routeWheelToChecklistFromEmptySpace, { passive: false });
}

function routeWheelToChecklistFromEmptySpace(event) {
  if (!window.matchMedia("(min-width: 768px)").matches) return;
  if (event.ctrlKey) return;

  const target = event.target;
  if (!(target instanceof Element)) return;

  if (target.closest("#permitList, #checklistPanel")) return;
  if (target.closest("input, select, textarea, button, a, summary")) return;

  const appShell = document.querySelector(".app-shell");
  const checklistPanel = document.getElementById("checklistPanel");
  if (!appShell || !checklistPanel) return;

  const shellRect = appShell.getBoundingClientRect();
  const isBesideAppContent =
    event.clientY >= shellRect.top &&
    event.clientY <= shellRect.bottom;

  if (!isBesideAppContent || checklistPanel.scrollHeight <= checklistPanel.clientHeight) {
    return;
  }

  const deltaY = normalizeWheelDelta(event, checklistPanel);
  if (!deltaY) return;

  const maxScrollTop = checklistPanel.scrollHeight - checklistPanel.clientHeight;
  const nextScrollTop = Math.max(
    0,
    Math.min(maxScrollTop, checklistPanel.scrollTop + deltaY)
  );

  checklistPanel.scrollTop = nextScrollTop;
  event.preventDefault();
}

function normalizeWheelDelta(event, scrollContainer) {
  if (event.deltaMode === WheelEvent.DOM_DELTA_LINE) {
    return event.deltaY * 16;
  }

  if (event.deltaMode === WheelEvent.DOM_DELTA_PAGE) {
    return event.deltaY * scrollContainer.clientHeight;
  }

  return event.deltaY;
}

function syncScrollablePanelHeights() {
  syncPermitListHeight();
  syncChecklistHeight();
}

function syncPermitListHeight() {
  const list = document.getElementById("permitList");
  if (!list) return;

  if (window.matchMedia("(max-width: 767px)").matches) {
    list.style.maxHeight = "";
    return;
  }

  requestAnimationFrame(() => {
    const bottomGap = 24;
    const listTop = list.getBoundingClientRect().top;
    const availableHeight = window.innerHeight - listTop - bottomGap;

    list.style.maxHeight = `${Math.max(0, availableHeight)}px`;
  });
}

function syncChecklistHeight() {
  const panel = document.getElementById("checklistPanel");
  if (!panel) return;

  if (window.matchMedia("(max-width: 767px)").matches) {
    panel.style.maxHeight = "";
    return;
  }

  requestAnimationFrame(() => {
    const bottomGap = 24;
    const panelTop = panel.getBoundingClientRect().top;
    const availableHeight = window.innerHeight - panelTop - bottomGap;

    panel.style.maxHeight = `${Math.max(0, availableHeight)}px`;
  });
}

function resetChecklistScroll() {
  const panel = document.getElementById("checklistPanel");
  const content = document.getElementById("content");

  if (panel) panel.scrollTop = 0;
  if (content) content.scrollTop = 0;
}

function scrollToContentOnMobile(behavior = "smooth") {
  if (!window.matchMedia("(max-width: 767px)").matches) return;

  requestAnimationFrame(() => {
    document.getElementById("content").scrollIntoView({
      behavior,
      block: "start"
    });
  });
}

function scrollToContentOnDesktop(behavior = "smooth") {
  if (!window.matchMedia("(min-width: 768px)").matches) return;

  requestAnimationFrame(() => {
    window.scrollTo({
      top: 0,
      behavior,
    });
  });
}

function scrollSelectedPermitIntoView(behavior = "auto") {
  requestAnimationFrame(() => {
    const container = document.getElementById("permitList");
    if (!container) return;

    const selected = container.querySelector(".permit-button[aria-current='true']");
    if (!selected) return;

    const targetTop = selected.offsetTop - container.offsetTop - (container.clientHeight * 0.065);
    container.scrollTo({
      top: Math.max(0, targetTop),
      behavior
    });
  });
}

function getCategories(permit) {
  return Array.isArray(permit.category)
    ? permit.category
    : [permit.category || "Other"];
}

function renderAll() {
  renderCategoryTabs();
  renderPermitList();
  renderPrintButton();
  renderContent();
  syncScrollablePanelHeights();
}

function renderPrintButton() {
  const button = document.getElementById("printChecklist");
  if (!button) return;

  button.hidden = !state.selectedPermit;
}

function renderCategoryTabs() {
  const container = document.getElementById("categoryTabs");
  container.innerHTML = "";

  const categories = new Set();
  state.permits.forEach(p => {
    getCategories(p).forEach(c => {
      if (c) categories.add(c.trim());
    });
  });

  const allBtn = document.createElement("button");
  allBtn.className = `w-full min-h-11 mb-2 px-3 py-2 rounded border text-sm ${state.activeCategory === "All" ? "city-blue-bg text-white" : "bg-white"}`;
  allBtn.textContent = "All";
  allBtn.onclick = () => {
    state.activeCategory = "All";
    renderAll();
  };
  container.appendChild(allBtn);

  const grid = document.createElement("div");
  grid.className = "category-grid grid grid-cols-2 gap-2";

  Array.from(categories).sort().forEach(cat => {
    const btn = document.createElement("button");
    btn.className = `min-h-11 px-3 py-2 rounded border text-sm ${state.activeCategory === cat ? "city-blue-bg text-white" : "bg-white"}`;
    btn.textContent = cat;
    btn.onclick = () => {
      state.activeCategory = cat;
      renderAll();
    };
    grid.appendChild(btn);
  });

  container.appendChild(grid);
}

function renderPermitList() {
  const container = document.getElementById("permitList");
  const filter = document.getElementById("searchInput").value.toLowerCase();

  container.innerHTML = "";

  const filtered = state.permits.filter(p => {
    const matchesSearch = p.name.toLowerCase().includes(filter);

    const matchesCategory =
      state.activeCategory === "All" ||
      getCategories(p).includes(state.activeCategory);

    const matchesProperty =
      state.propertyType === "All" ||
      !p.propertyType ||
      p.propertyType.includes(state.propertyType);

    return matchesSearch && matchesCategory && matchesProperty;
  });

  if (!filtered.length) {
    container.innerHTML = `<div class="text-gray-500 text-center">No results</div>`;
    return;
  }

  filtered.forEach(permit => {
    const btn = document.createElement("button");
    const isSelected = state.selectedFile === permit.file;

    const category = getCategories(permit).join(", ");
    const property = (permit.propertyType || []).join(", ");

    btn.className = `permit-button w-full text-left rounded border px-3 py-3 md:py-2 transition-colors ${isSelected ? "city-blue-bg text-white" : "bg-white hover:bg-gray-100"}`;
    if (isSelected) {
      btn.setAttribute("aria-current", "true");
    }

    btn.innerHTML = `
      <div class="permit-button__name leading-snug">${permit.name}</div>
      <div class="permit-meta text-xs mt-1 ${isSelected ? "text-white" : "text-gray-500"}">
        ${category}${property ? " - " + property : ""}
      </div>
    `;

    btn.onclick = () => {
      state.selectedPermit = permit;
      state.selectedFile = permit.file;
      state.selectedCategory = permit.category;

      // Update URL.
      const url = new URL(window.location);
      url.searchParams.set("permit", permit.file);
      window.history.replaceState({}, "", url);

      renderAll();
      scrollSelectedPermitIntoView("smooth");
      scrollToContentOnMobile("smooth");
      scrollToContentOnDesktop("smooth");
    };

    container.appendChild(btn);
  });
}

window.addEventListener("hashchange", () => {
  const target = getTargetPermit();
  if (!target) return;

  const match = state.permits.find(p => p.file === target);
  if (match) {
    state.selectedPermit = match;
    state.selectedFile = match.file;
    state.selectedCategory = match.category;
    renderAll();
    scrollSelectedPermitIntoView("auto");
    scrollToContentOnMobile("auto");
    scrollToContentOnDesktop("auto");
  }
});

function formatDate(dateStr) {
  if (!dateStr) return "";
  const [year, month, day] = dateStr.split("-");
  return `${month}/${day}/${year}`;
}

function renderRequirementItem(item) {
  let name = "";
  let description = "";
  let links = [];
  let variant = item.variant || "";

  if (item.type === "requirement") {
    name = item.label || item.value || "";
    description = item.description || "";
    links = item.links || [];
  } else {
    const req = state.library[item.id] || {};
    name = item.label || item.value || req.name || item.id || "";
    description = item.description || req.description || "";
    links = item.links || req.links || [];
    variant = item.variant || req.variant || "";
  }

  const isNotice = variant === "notice";
  const itemClasses = [
    "check-item flex items-start gap-3 p-3 mb-2 border rounded",
    isNotice ? "special-requirement--notice" : "bg-white"
  ].join(" ");
  const titleClasses = isNotice
    ? "special-requirement__title font-semibold"
    : "font-medium";
  const descriptionClasses = isNotice
    ? "text-sm text-gray-700 mt-1"
    : "text-sm text-gray-500 mt-1";

  return `
    <div class="${itemClasses}">
      <input type="checkbox" class="mt-1 w-4 h-4 shrink-0" />
      <div class="check-item-content">
        <div class="${titleClasses}">${name}</div>
        ${description ? `<div class="${descriptionClasses}">${description}</div>` : ""}
        ${links.length ? `
          <div class="mt-1 text-sm">
            ${links.map(l => `<a href="${l.url}" target="_blank" class="text-blue-600 underline">${l.label}</a>`).join("<br>")}
          </div>
        ` : ""}
      </div>
    </div>
  `;
}

function renderContent() {
  const container = document.getElementById("content");

  if (!state.selectedPermit) {
    container.innerHTML = `
      <div class="text-gray-600">
        <div class="text-lg font-semibold mb-2">Choose a Permit Type</div>
        <p>Use the Select Permit Type list to open a checklist with application requirements, documents, and inspection details.</p>
        <p class="mt-2 text-sm text-gray-500">
          Search by the name of the permit type, or use More Options to filter down by property type and permit group.
        </p>
      </div>
      <!-- BETA NOTICE -->
      &nbsp;
      <div id="betaNotice" class="mb-4 p-3 rounded border-l-4 border-yellow-400 bg-yellow-50 text-sm text-gray-700 flex justify-between items-start gap-3">
        <div>
          <div class="font-semibold text-yellow-700 mb-1">Introducing the Permit Checklist Tool</div>
          <div>
            Welcome to our new permit checklist tool. This is a first version, designed to provide clear and accessible information about the requirements for different types of permits. We've included checklists for common permit types, along with details on required documents and inspections.
            <p class="mt-2"> As we continue to build and refine it, your feedback is especially helpful. If you notice anything that's unclear, missing, or not working as expected, please contact the Building Department: <a href="mailto:Christopher.Feltgen@copbfl.com" class="text-blue-600 underline">Christopher.Feltgen@copbfl.com</a>.
            <p class="mt-2">Thank you for your help as we work to make this a useful resource for everyone!</p>
          </div>
        </div>
        <button 
          onclick="document.getElementById('betaNotice').style.display='none'" 
          class="text-gray-500 hover:text-gray-700 text-lg leading-none"
          aria-label="Dismiss">
          &times;
        </button>
      </div>
    `;
    resetChecklistScroll();
    return;
  }

  const data = state.selectedPermit;

    let html = `
      <!-- PRINT HEADER -->
      <div class="print-header mb-3">
        <div class="flex items-center justify-between border-b pb-2">
          
          <div class="flex items-center gap-3">
            <img src="https://www.pompanobeachfl.gov/pompanobeachfl/assets/images/sitewide/COPB_Logo.png" 
                class="h-12 w-auto" />

            <div>
              <div class="font-bold text-lg">City of Pompano Beach</div>
              <div class="text-sm text-gray-600">Building Department</div>
            </div>
          </div>

          <div class="text-right text-sm text-gray-600">
            <div>100 W. Atlantic Blvd</div>
            <div>Pompano Beach, FL 33060</div>
            <div>954.786.4669</div>
          </div>
        </div>

      <div class="text-2xl font-semibold">
        <span class="screen-title">Permit Application Checklists</span>
      </div>
      <div class="print-divider"></div>
      </div>

<div class="permit-heading mb-4 flex flex-col sm:flex-row sm:justify-between sm:items-end gap-1 sm:gap-4">
  <div class="text-lg sm:text-xl font-semibold leading-snug">
    ${data.name}
    <span class="print-title hidden"> - Permit Checklist</span>
  </div>

  ${data.lastUpdated ? `
    <div class="text-xs text-gray-500 italic shrink-0">
      Updated: ${formatDate(data.lastUpdated)}
    </div>
  ` : ""}
</div>
    `;

  const whenPermitRequired = data.whenPermitRequired;
  const hintTitle = data.hintTitle || "Hint";
  const hint = data.hint;

  if (whenPermitRequired) {
    html += `
      <div class="mb-4 p-4 rounded border-l-4 city-blue-border city-bg-blue-50 text-sm text-gray-700">
        <div class="font-semibold city-blue-text mb-1">When do I need a Permit?</div>
        <div>${whenPermitRequired}</div>
      </div>
    `;
  }

  if (data.hintTitle || hint) {
    html += `
      <div class="mb-4 p-4 rounded border-l-4 hint-border hint-bg text-sm text-gray-700">
        <div class="font-semibold hint-text ${hint ? "mb-1" : ""}">${hintTitle}</div>
        ${hint ? `<div>${hint}</div>` : ""}
      </div>
    `;
  }

  data.sections.forEach(section => {
    html += `<div class="section-card mb-4 sm:mb-6 border rounded-lg p-3 sm:p-4 bg-gray-50">`;

    let firstItem = true;

    html += `<div class="section-start">
      <h2 class="font-semibold mb-3">${section.name}</h2>`;

section.items.forEach(item => {

  let blockHtml = "";

  if (item.type === "inspection_group") {
    blockHtml = `
      <div class="inspection-group mb-3 sm:mb-4 p-3 sm:p-4 border rounded bg-white">
        <div class="font-semibold mb-2">${item.label}</div>
        <ol class="list-decimal ml-5 space-y-1 text-sm">
          ${item.inspections.map(i => `<li>${i}</li>`).join("")}
        </ol>
      </div>
    `;
  } else {
    blockHtml = renderRequirementItem(item);
  }

  if (firstItem) {
    html += blockHtml + `</div>`; // closes .section-start
    firstItem = false;
  } else {
    html += blockHtml;
  }

});

    html += `</div>`;
  });

const shouldShowNoticeOfCommencement =
  data.noticeOfCommencementRequired !== false;

if (shouldShowNoticeOfCommencement) {
  const noticeOfCommencementRequirementId =
    data.noticeOfCommencementRequirementId || "req_notice_of_commencement";

  if (state.library[noticeOfCommencementRequirementId]) {
    html += renderRequirementItem({ id: noticeOfCommencementRequirementId });
  }

  if (data.noticeOfCommencement) {
    html += `
      <div class="mt-8 p-4 border-l-4 border-yellow-500 bg-yellow-50 text-sm text-gray-700 rounded">
        <div class="font-semibold text-yellow-700 mb-1">Notice of Commencement</div>
        <div>${data.noticeOfCommencement}</div>
      </div>
    `;
  }
}

  html += `
    <div class="mt-6 text-sm text-gray-500 text-center">
      <i>Each project is unique. Additional information or documentation may be required based on the scope of work.</i>
    </div>
  `;

  container.innerHTML = html;
  resetChecklistScroll();
}

</script>
</body>
</html>
